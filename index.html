<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小甄的技术博客 — 代码、架构、踩坑记录</title>
  <style>
    /* ========== Reset & Base ========== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#ffffff;--bg-alt:#f6f8fa;--text:#24292f;--text-muted:#656d76;
      --accent:#0969da;--accent-hover:#0550ae;--border:#d0d7de;
      --card-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.08);
      --card-hover-shadow:0 4px 16px rgba(0,0,0,.1);
      --radius:8px;--radius-lg:12px;
    }
    html{scroll-behavior:smooth}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Helvetica,Arial,sans-serif;
      color:var(--text);background:var(--bg);line-height:1.6;
      -webkit-font-smoothing:antialiased;
    }
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}

    /* ========== Skip Link ========== */
    .skip-link{
      position:absolute;top:-100px;left:16px;background:var(--accent);color:#fff;
      padding:8px 16px;border-radius:0 0 var(--radius) var(--radius);z-index:1000;
      transition:top .2s;
    }
    .skip-link:focus{top:0}

    /* ========== Header ========== */
    .header{
      position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .header-inner{
      max-width:1200px;margin:0 auto;padding:0 24px;
      display:flex;align-items:center;justify-content:space-between;height:60px;
    }
    .logo{
      display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;
      color:var(--text);white-space:nowrap;
    }
    .logo .emoji{font-size:28px}
    .logo:hover{text-decoration:none;color:var(--accent)}
    .nav{display:flex;gap:4px;align-items:center}
    .nav a{
      padding:8px 14px;border-radius:6px;color:var(--text);
      font-size:14px;font-weight:500;transition:all .15s;
    }
    .nav a:hover{background:var(--bg-alt);text-decoration:none}
    .nav a.active{color:var(--accent);background:#ddf4ff}

    /* Add button in header */
    .btn-add-header{
      margin-left:8px;padding:8px 18px;background:var(--accent);color:#fff;
      border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;
      transition:all .15s;display:flex;align-items:center;gap:6px;
    }
    .btn-add-header:hover{background:var(--accent-hover);transform:translateY(-1px)}
    .btn-add-header .plus{font-size:18px;line-height:1}

    /* Manage mode button */
    .btn-manage{
      margin-left:8px;padding:8px 14px;background:transparent;color:var(--text-muted);
      border:1px solid var(--border);border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;
      transition:all .15s;
    }
    .btn-manage:hover{border-color:var(--accent);color:var(--accent)}
    .btn-manage.active{background:#cf222e;color:#fff;border-color:#cf222e}

    /* Mobile nav */
    .nav-toggle{display:none;background:none;border:none;font-size:24px;cursor:pointer;padding:4px}

    /* ========== Hero / Featured ========== */
    .featured{
      max-width:1200px;margin:0 auto;padding:40px 24px 20px;
    }
    .section-title{
      font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;
    }
    .section-title::after{
      content:"";flex:1;height:1px;background:var(--border);
    }
    .featured-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:20px;
    }
    .card{
      background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);
      overflow:hidden;transition:all .25s;cursor:pointer;
    }
    .card:hover{
      transform:translateY(-4px);box-shadow:var(--card-hover-shadow);
    }
    .card-img{
      width:100%;height:200px;object-fit:cover;display:block;
      background:linear-gradient(135deg,#ddf4ff,#e6f0ff);
    }
    .card-img-placeholder{
      width:100%;height:200px;display:flex;align-items:center;justify-content:center;
      font-size:48px;color:#fff;
    }
    .card-img-error{
      width:100%;height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#f6f8fa;color:var(--text-muted);font-size:13px;gap:8px;
    }
    .card-body{padding:16px 18px 20px}
    .card-category{
      display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;
      letter-spacing:.5px;color:var(--accent);background:#ddf4ff;
      padding:3px 10px;border-radius:20px;margin-bottom:8px;
    }
    .card-title{
      font-size:17px;font-weight:700;line-height:1.4;margin-bottom:6px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .card-desc{
      font-size:13px;color:var(--text-muted);line-height:1.5;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }

    /* ========== Category Sections ========== */
    .section{
      max-width:1200px;margin:0 auto;padding:30px 24px;
    }
    .section-header{
      display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
    }
    .section-heading{
      font-size:20px;font-weight:700;
    }
    .section-heading a{color:var(--text)}
    .section-heading a:hover{text-decoration:none;color:var(--accent)}
    .section-more{
      font-size:13px;color:var(--accent);font-weight:600;
    }
    .card-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:20px;
    }

    /* ========== Follow / Social ========== */
    .social{
      max-width:1200px;margin:0 auto;padding:20px 24px 40px;text-align:center;
    }
    .social-links{display:flex;justify-content:center;gap:20px;margin-top:12px}
    .social-link{
      display:flex;align-items:center;gap:6px;padding:10px 20px;
      border:1px solid var(--border);border-radius:var(--radius);
      font-size:14px;font-weight:600;transition:all .15s;
    }
    .social-link:hover{background:var(--bg-alt);text-decoration:none}

    /* ========== Footer ========== */
    .footer{
      background:var(--bg-alt);border-top:1px solid var(--border);padding:40px 24px 24px;
    }
    .footer-inner{max-width:1200px;margin:0 auto}
    .footer-about{margin-bottom:24px}
    .footer-about h3{font-size:18px;margin-bottom:8px}
    .footer-about p{font-size:13px;color:var(--text-muted);max-width:600px;line-height:1.7}
    .footer-bottom{
      display:flex;justify-content:space-between;align-items:center;
      padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);
    }
    .footer-links{display:flex;gap:16px}
    .footer-links a{font-size:12px;color:var(--text-muted)}

    /* ========== Floating Add Button ========== */
    .fab{
      position:fixed;bottom:32px;right:32px;width:56px;height:56px;
      background:var(--accent);color:#fff;border:none;border-radius:50%;
      font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(9,105,218,.35);
      transition:all .2s;z-index:50;display:flex;align-items:center;justify-content:center;
    }
    .fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(9,105,218,.45)}

    /* ========== Modal ========== */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    .modal-overlay.active{opacity:1;pointer-events:auto}
    .modal{
      background:var(--bg);border-radius:var(--radius-lg);padding:32px;
      width:90%;max-width:520px;max-height:90vh;overflow-y:auto;
      box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(20px);
      transition:transform .25s;
    }
    .modal-overlay.active .modal{transform:translateY(0)}
    .modal h2{font-size:22px;font-weight:700;margin-bottom:24px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)}
    .form-group input,.form-group select,.form-group textarea{
      width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;
      font-size:14px;font-family:inherit;transition:border-color .15s;
    }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{
      outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(9,105,218,.15);
    }
    .form-group textarea{min-height:100px;resize:vertical}
    .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:8px}
    .btn{
      padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;
      cursor:pointer;border:none;transition:all .15s;
    }
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-cancel{background:var(--bg-alt);color:var(--text);border:1px solid var(--border)}
    .btn-cancel:hover{background:var(--border)}

    /* ========== Delete Button on Cards ========== */
    .card-wrapper{position:relative}
    .card-delete{
      position:absolute;top:8px;right:8px;width:28px;height:28px;
      background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:50%;
      font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;
      z-index:5;color:#cf222e;transition:all .15s;
    }
    .card-wrapper:hover .card-delete{display:flex}
    .manage-mode .card-delete{display:flex !important}
    .card-delete:hover{background:#cf222e;color:#fff;border-color:#cf222e}
    .empty-state{grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)}

    /* ========== Trash Badge ========== */
    .trash-badge{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:18px;height:18px;padding:0 5px;border-radius:9px;
      background:#cf222e;color:#fff;font-size:11px;font-weight:700;
      margin-left:4px;vertical-align:middle;
    }

    /* ========== Trash Page ========== */
    .trash-page{display:none;max-width:1200px;margin:0 auto;padding:30px 24px}
    .trash-page.show{display:block}
    .trash-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .trash-toolbar h2{font-size:20px;font-weight:700}
    .btn-danger{
      padding:8px 16px;background:#cf222e;color:#fff;border:none;border-radius:6px;
      font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
    }
    .btn-danger:hover{background:#a40e26}
    .btn-restore{
      padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;
      font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
    }
    .btn-restore:hover{background:var(--accent-hover)}
    .trash-item{
      display:flex;align-items:center;gap:16px;padding:14px 18px;
      border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;
      transition:all .2s;background:var(--bg);
    }
    .trash-item:hover{background:var(--bg-alt)}
    .trash-item-info{flex:1;min-width:0}
    .trash-item-title{font-size:15px;font-weight:600;margin-bottom:4px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .trash-item-meta{font-size:12px;color:var(--text-muted);display:flex;gap:12px}
    .trash-item-actions{display:flex;gap:8px;flex-shrink:0}
    .trash-item .card-category{font-size:10px;padding:2px 8px}

    /* ========== Toast ========== */
    .toast{
      position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
      background:#1f2328;color:#fff;padding:12px 24px;border-radius:8px;
      font-size:14px;z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;
    }
    .toast.show{opacity:1}

    /* ========== Responsive ========== */
    @media(max-width:768px){
      .header-inner{padding:0 16px}
      .nav{display:none;position:absolute;top:60px;left:0;right:0;
        flex-direction:column;background:var(--bg);border-bottom:1px solid var(--border);
        padding:8px 16px;gap:0;
      }
      .nav.open{display:flex}
      .nav a{padding:10px 12px}
      .nav-toggle{display:block}
      .featured-grid,.card-grid{grid-template-columns:1fr;gap:16px}
      .section{padding:24px 16px}
      .featured{padding:24px 16px 12px}
      .footer-bottom{flex-direction:column;gap:12px;text-align:center}
      .fab{bottom:24px;right:24px;width:48px;height:48px;font-size:24px}
    }
  </style>
</head>

<!-- ==================== MODAL ==================== -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>&#128221; 新增文章</h2>
    <form id="add-form" onsubmit="handleAdd(event)">
      <div class="form-group">
        <label for="title">文章标题 *</label>
        <input type="text" id="title" placeholder="输入文章标题..." required>
      </div>
      <div class="form-group">
        <label for="category">分类 *</label>
        <select id="category" required>
          <option value="">选择分类...</option>
          <option value="代码">代码</option>
          <option value="架构">架构</option>
          <option value="踩坑">踩坑</option>
          <option value="工具">工具</option>
          <option value="关于">关于</option>
        </select>
      </div>
      <div class="form-group">
        <label for="desc">文章摘要</label>
        <textarea id="desc" placeholder="写一段简短的描述..." rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="image">封面图片 URL（可选）</label>
        <input type="url" id="image" placeholder="https://example.com/image.jpg">
        <div id="image-preview" style="margin-top:8px;display:none">
          <img src="" alt="预览" style="max-width:100%;max-height:120px;border-radius:6px;border:1px solid var(--border);object-fit:cover;">
        </div>
      </div>
      <div class="form-group">
        <label for="featured">设为精选</label>
        <select id="featured">
          <option value="false">否</option>
          <option value="true">是</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary">发布文章</button>
      </div>
    </form>
  </div>
</div>

    { id:5, title:'设计一个高性能消息队列', category:'架构', desc:'从需求分析到技术选型，设计一个支持百万 TPS 的消息队列，并深入讨论存储与复制机制。', featured:false, color:COLORS[4], image:'' },
    { id:6, title:'CMake 现代工程实践指南', category:'工具', desc:'告别混乱的 CMakeLists.txt，用 Modern CMake 最佳实践管理复杂的 C/C++ 嵌入式项目。', featured:false, color:COLORS[5], image:'' },
    { id:7, title:'PostgreSQL 查询优化 20 条经验', category:'踩坑', desc:'整理实际项目中遇到的慢查询问题，覆盖索引设计、执行计划分析、锁排查等核心场景。', featured:false, color:COLORS[0], image:'' },
    { id:8, title:'Docker 多阶段构建最佳实践', category:'工具', desc:'如何用多阶段构建将 Docker 镜像从 1.2GB 瘦身到 80MB，附完整 Dockerfile 示例。', featured:false, color:COLORS[1], image:'' },
    { id:9, title:'自建 Git 服务器选型对比', category:'工具', desc:'Gitea vs GitLab vs Gogs 全面对比，从安装部署、资源占用到功能覆盖度的详细评测。', featured:false, color:COLORS[2], image:'' },
    { id:10, title:'FreeRTOS 任务调度源码分析', category:'代码', desc:'深入 FreeRTOS 内核，逐行分析任务调度器的实现原理，理解抢占与时间片轮转的细节。', featured:false, color:COLORS[3], image:'' },
    { id:11, title:'年终总结：2025 技术成长回顾', category:'关于', desc:'回顾过去一年的技术成长：掌握的新技能、参与的项目、阅读的书单，以及对 2026 的展望。', featured:false, color:COLORS[4], image:'' },
    { id:12, title:'关于我', category:'关于', desc:'一枚嵌入式工程师，热爱开源，喜欢钻研底层原理。这里是我的技术自留地。', featured:false, color:COLORS[5], image:'' },
  ];

  let articles = loadArticles();
  let trash = loadTrash();
  let manageMode = false;
  let lastDeleted = null;
  let undoTimer = null;

  function loadArticles() {
    const saved = localStorage.getItem('blog_articles');
    if (saved) {
      try { return JSON.parse(saved); } catch(e) {}
    }
    return [...DEFAULT_ARTICLES];
  }

  function saveArticles() {
    localStorage.setItem('blog_articles', JSON.stringify(articles));
  }

  function loadTrash() {
    const saved = localStorage.getItem('blog_trash');
    return saved ? JSON.parse(saved) : [];
  }

  function saveTrash() {
    localStorage.setItem('blog_trash', JSON.stringify(trash));
    updateTrashBadge();
  }

  function updateTrashBadge() {
    const badge = document.getElementById('trash-count');
    if (trash.length > 0) {
      badge.style.display = 'inline-flex';
      badge.textContent = trash.length;
    } else {
      badge.style.display = 'none';
    }
    const btn = document.getElementById('btn-empty-trash');
    if (btn) btn.style.display = trash.length > 0 ? '' : 'none';
  }

  /* ========== Render ========== */
  function renderCard(a) {
    const imgHtml = a.image
      ? `<img src="${escapeHtml(a.image)}" class="card-img" alt="${escapeHtml(a.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-img-error" style="display:none">&#128247; 图片加载失败</div>`
      : `<div class="card-img-placeholder" style="background:linear-gradient(135deg,${a.color},${a.color}cc)">&#128196;</div>`;

    return `
      <div class="card-wrapper">
        <button class="card-delete" title="删除" onclick="event.stopPropagation();deleteArticle(${a.id})">&times;</button>
        <div class="card" onclick="viewArticle(${a.id})">
          ${imgHtml}
          <div class="card-body">
            <span class="card-category">${a.category}</span>
            <h3 class="card-title">${escapeHtml(a.title)}</h3>
            ${a.desc ? `<p class="card-desc">${escapeHtml(a.desc)}</p>` : ''}
          </div>
        </div>
      </div>`;
  }

  function renderAll() {
    // Featured
    const featured = articles.filter(a => a.featured);
    const featuredGrid = document.getElementById('featured-grid');
    featuredGrid.innerHTML = featured.length
      ? featured.map(renderCard).join('')
      : '<div class="empty-state">暂无精选文章，在新增文章时可勾选"设为精选"</div>';

    // Category grids
    const categories = { '代码':'code', '架构':'architecture', '踩坑':'debug', '工具':'tools' };
    for (const [cat, key] of Object.entries(categories)) {
      const items = articles.filter(a => a.category === cat && !a.featured).slice(0, 3);
      const grid = document.getElementById('grid-' + key);
      grid.innerHTML = items.length
        ? items.map(renderCard).join('')
        : '<div class="empty-state">该分类暂无文章，点击下方 + 新增一篇吧</div>';
    }

    // Check if featured section should show
    document.getElementById('featured-section').style.display = featured.length ? '' : 'none';
  }

  /* ========== Utilities ========== */
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ========== Image Preview ========== */
  document.addEventListener('DOMContentLoaded', () => {
    const imgInput = document.getElementById('image');
    imgInput.addEventListener('input', function() {
      const preview = document.getElementById('image-preview');
      const img = preview.querySelector('img');
      if (this.value.trim()) {
        img.src = this.value.trim();
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    });
  });

  /* ========== Manage Mode ========== */
  function toggleManageMode() {
    manageMode = !manageMode;
    const btn = document.getElementById('btn-manage');
    if (manageMode) {
      document.body.classList.add('manage-mode');
      btn.classList.add('active');
      btn.textContent = '退出管理';
    } else {
      document.body.classList.remove('manage-mode');
      btn.classList.remove('active');
      btn.textContent = '管理';
    }
  }
  function filterCategory(cat) {
    // Update nav active
    document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
    const links = document.querySelectorAll('.nav a');
    links.forEach(a => {
      if (a.textContent.includes(cat === 'all' ? '全部' : cat)) a.classList.add('active');
    });

    // Scroll to top
    window.scrollTo({ top: 0, behavior: 'smooth' });

    // Show alert with filtered info
    if (cat === 'all') return;
    const filtered = articles.filter(a => a.category === cat);
    showToast(`${cat}分类共 ${filtered.length} 篇文章`);
  }

  /* ========== Modal ========== */
  function openModal() {
    document.getElementById('modal-overlay').classList.add('active');
    document.getElementById('title').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    document.getElementById('add-form').reset();
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  /* ========== Handle Add ========== */
  function handleAdd(e) {
    e.preventDefault();
    const title = document.getElementById('title').value.trim();
    const category = document.getElementById('category').value;
    const desc = document.getElementById('desc').value.trim();
    const image = document.getElementById('image').value.trim();
    const featured = document.getElementById('featured').value === 'true';

    const newArticle = {
      id: Date.now(),
      title,
      category,
      desc,
      image,
      featured,
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    };

    // If featured, un-feature others if > 3
    if (featured) {
      const featuredCount = articles.filter(a => a.featured).length;
      if (featuredCount >= 6) {
        articles.find(a => a.featured).featured = false;
      }
    }

    articles.unshift(newArticle);
    saveArticles();
    renderAll();
    closeModal();
    showToast('文章发布成功！');
    closeMobileNav();
  }

  /* ========== Delete ========== */
  function deleteArticle(id) {
    const idx = articles.findIndex(a => a.id === id);
    if (idx === -1) return;
    lastDeleted = articles.splice(idx, 1)[0];
    trash.unshift({ ...lastDeleted, deletedAt: Date.now() });
    saveArticles();
    saveTrash();
    renderAll();
    showToast('文章已移至回收站', 'undo-delete');
    clearTimeout(undoTimer);
    undoTimer = setTimeout(() => { lastDeleted = null; }, 5000);
  }

  function undoDelete() {
    if (!lastDeleted) return;
    articles.unshift(lastDeleted);
    const trashIdx = trash.findIndex(t => t.id === lastDeleted.id);
    if (trashIdx !== -1) trash.splice(trashIdx, 1);
    lastDeleted = null;
    saveArticles();
    saveTrash();
    renderAll();
    if (document.getElementById('trash-page').classList.contains('show')) renderTrash();
    showToast('已撤销删除');
  }

  /* ========== View ========== */
  function viewArticle(id) {
    const a = articles.find(x => x.id === id);
    if (!a) return;
    showToast(`查看文章：${a.title}`);
  }

  /* ========== Trash Page ========== */
  function showTrash() {
    // Hide main content sections
    document.getElementById('featured-section').style.display = 'none';
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.querySelector('.social').style.display = 'none';
    // Show trash page
    document.getElementById('trash-page').classList.add('show');
    // Update nav
    document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
    document.getElementById('nav-trash').classList.add('active');
    renderTrash();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function hideTrash() {
    document.getElementById('trash-page').classList.remove('show');
    document.querySelector('.social').style.display = '';
    document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
    document.querySelector('.nav a').classList.add('active');
    renderAll();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderTrash() {
    const list = document.getElementById('trash-list');
    updateTrashBadge();
    if (trash.length === 0) {
      list.innerHTML = '<div class="empty-state">回收站是空的</div>';
      return;
    }
    const timeAgo = ts => {
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return `${mins} 分钟前`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} 小时前`;
      const days = Math.floor(hours / 24);
      return `${days} 天前`;
    };
    list.innerHTML = trash.map(t => `
      <div class="trash-item">
        <div class="trash-item-info">
          <div class="trash-item-title">${escapeHtml(t.title)}</div>
          <div class="trash-item-meta">
            <span class="card-category">${t.category}</span>
            <span>删除于 ${timeAgo(t.deletedAt)}</span>
          </div>
        </div>
        <div class="trash-item-actions">
          <button class="btn-restore" onclick="restoreArticle(${t.id})">&#8634; 恢复</button>
          <button class="btn-danger" onclick="permanentDelete(${t.id})">彻底删除</button>
        </div>
      </div>
    `).join('');
  }

  function restoreArticle(id) {
    const idx = trash.findIndex(t => t.id === id);
    if (idx === -1) return;
    const article = trash.splice(idx, 1)[0];
    delete article.deletedAt;
    articles.unshift(article);
    saveArticles();
    saveTrash();
    renderTrash();
    showToast('「' + article.title + '」已恢复');
    // If trash is now empty, go back to home
    if (trash.length === 0) { setTimeout(hideTrash, 600); }
  }

  function permanentDelete(id) {
    if (!confirm('彻底删除后无法恢复，确定吗？')) return;
    const idx = trash.findIndex(t => t.id === id);
    if (idx === -1) return;
    const title = trash[idx].title;
    trash.splice(idx, 1);
    saveTrash();
    renderTrash();
    showToast('「' + title + '」已彻底删除');
    if (trash.length === 0) { setTimeout(hideTrash, 600); }
  }

  function emptyTrash() {
    if (trash.length === 0) return;
    if (!confirm(`回收站中有 ${trash.length} 篇文章，清空后无法恢复，确定吗？`)) return;
    trash = [];
    saveTrash();
    renderTrash();
    showToast('回收站已清空');
    setTimeout(hideTrash, 600);
  }

  /* ========== Toast ========== */
  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    if (type === 'undo-delete') {
      toast.innerHTML = `${msg} &nbsp; <a href="#" onclick="undoDelete();return false" style="color:#58a6ff;font-weight:600">撤销</a>`;
    } else {
      toast.textContent = msg;
    }
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), type === 'undo-delete' ? 5000 : 2500);
  }

  /* ========== Mobile Nav ========== */
  function toggleNav() {
    document.getElementById('nav').classList.toggle('open');
  }
  function closeMobileNav() {
    document.getElementById('nav').classList.remove('open');
  }

  /* ========== Keyboard ========== */
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
      e.preventDefault();
      openModal();
    }
  });

  /* ========== Init ========== */
  renderAll();
  updateTrashBadge();
</script>

</body>
</html>
