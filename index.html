<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小甄的技术博客 — 代码、架构、踩坑记录</title>
  <style>
    /* ========== Reset & Base ========== */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#ffffff;--bg-alt:#f6f8fa;--text:#24292f;--text-muted:#656d76;
      --accent:#0969da;--accent-hover:#0550ae;--border:#d0d7de;
      --card-shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.08);
      --card-hover-shadow:0 4px 16px rgba(0,0,0,.1);
      --radius:8px;--radius-lg:12px;
    }
    html{scroll-behavior:smooth}
    body{
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans SC",Helvetica,Arial,sans-serif;
      color:var(--text);background:var(--bg);line-height:1.6;
      -webkit-font-smoothing:antialiased;
    }
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}

    /* ========== Skip Link ========== */
    .skip-link{
      position:absolute;top:-100px;left:16px;background:var(--accent);color:#fff;
      padding:8px 16px;border-radius:0 0 var(--radius) var(--radius);z-index:1000;
      transition:top .2s;
    }
    .skip-link:focus{top:0}

    /* ========== Header ========== */
    .header{
      position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);
      backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .header-inner{
      max-width:1200px;margin:0 auto;padding:0 24px;
      display:flex;align-items:center;justify-content:space-between;height:60px;
    }
    .logo{
      display:flex;align-items:center;gap:10px;font-size:20px;font-weight:700;
      color:var(--text);white-space:nowrap;
    }
    .logo .emoji{font-size:28px}
    .logo:hover{text-decoration:none;color:var(--accent)}
    .nav{display:flex;gap:4px;align-items:center}
    .nav a{
      padding:8px 14px;border-radius:6px;color:var(--text);
      font-size:14px;font-weight:500;transition:all .15s;
    }
    .nav a:hover{background:var(--bg-alt);text-decoration:none}
    .nav a.active{color:var(--accent);background:#ddf4ff}

    /* Add button in header */
    .btn-add-header{
      margin-left:8px;padding:8px 18px;background:var(--accent);color:#fff;
      border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;
      transition:all .15s;display:flex;align-items:center;gap:6px;
    }
    .btn-add-header:hover{background:var(--accent-hover);transform:translateY(-1px)}
    .btn-add-header .plus{font-size:18px;line-height:1}

    /* Manage mode button */
    .btn-manage{
      margin-left:8px;padding:8px 14px;background:transparent;color:var(--text-muted);
      border:1px solid var(--border);border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;
      transition:all .15s;
    }
    .btn-manage:hover{border-color:var(--accent);color:var(--accent)}
    .btn-manage.active{background:#cf222e;color:#fff;border-color:#cf222e}

    /* Mobile nav */
    .nav-toggle{display:none;background:none;border:none;font-size:24px;cursor:pointer;padding:4px}

    /* ========== Hero / Featured ========== */
    .featured{
      max-width:1200px;margin:0 auto;padding:40px 24px 20px;
    }
    .section-title{
      font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px;
    }
    .section-title::after{
      content:"";flex:1;height:1px;background:var(--border);
    }
    .featured-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:20px;
    }
    .card{
      background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);
      overflow:hidden;transition:all .25s;cursor:pointer;
    }
    .card:hover{
      transform:translateY(-4px);box-shadow:var(--card-hover-shadow);
    }
    .card-img{
      width:100%;height:200px;object-fit:cover;display:block;
      background:linear-gradient(135deg,#ddf4ff,#e6f0ff);
    }
    .card-img-placeholder{
      width:100%;height:200px;display:flex;align-items:center;justify-content:center;
      font-size:48px;color:#fff;
    }
    .card-img-error{
      width:100%;height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:#f6f8fa;color:var(--text-muted);font-size:13px;gap:8px;
    }
    .card-upload-btn{
      position:absolute;top:8px;right:8px;width:32px;height:32px;
      background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:50%;
      display:flex;align-items:center;justify-content:center;cursor:pointer;
      font-size:16px;opacity:0;transition:opacity .15s;z-index:3;
    }
    .card-wrapper:hover .card-upload-btn{opacity:1}
    .card-upload-btn:hover{background:#ddf4ff;border-color:var(--accent)}
    .card-upload-input{display:none}
    .card-body{padding:16px 18px 20px}
    .card-category{
      display:inline-block;font-size:11px;font-weight:600;text-transform:uppercase;
      letter-spacing:.5px;color:var(--accent);background:#ddf4ff;
      padding:3px 10px;border-radius:20px;margin-bottom:8px;
    }
    .card-title{
      font-size:17px;font-weight:700;line-height:1.4;margin-bottom:6px;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .card-desc{
      font-size:13px;color:var(--text-muted);line-height:1.5;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
      margin-bottom:10px;
    }
    .card-readmore{
      display:inline-flex;align-items:center;gap:4px;
      font-size:13px;font-weight:600;color:var(--accent);
      cursor:pointer;transition:all .15s;padding:0;
    }
    .card-readmore:hover{text-decoration:underline;gap:8px}

    /* ========== Category Sections ========== */
    .section{
      max-width:1200px;margin:0 auto;padding:30px 24px;
    }
    .section-header{
      display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;
    }
    .section-heading{
      font-size:20px;font-weight:700;
    }
    .section-heading a{color:var(--text)}
    .section-heading a:hover{text-decoration:none;color:var(--accent)}
    .section-more{
      font-size:13px;color:var(--accent);font-weight:600;
    }
    .card-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:20px;
    }

    /* ========== Follow / Social ========== */
    .social{
      max-width:1200px;margin:0 auto;padding:20px 24px 40px;text-align:center;
    }
    .social-links{display:flex;justify-content:center;gap:20px;margin-top:12px}
    .social-link{
      display:flex;align-items:center;gap:6px;padding:10px 20px;
      border:1px solid var(--border);border-radius:var(--radius);
      font-size:14px;font-weight:600;transition:all .15s;
    }
    .social-link:hover{background:var(--bg-alt);text-decoration:none}

    /* ========== Footer ========== */
    .footer{
      background:var(--bg-alt);border-top:1px solid var(--border);padding:40px 24px 24px;
    }
    .footer-inner{max-width:1200px;margin:0 auto}
    .footer-about{margin-bottom:24px}
    .footer-about h3{font-size:18px;margin-bottom:8px}
    .footer-about p{font-size:13px;color:var(--text-muted);max-width:600px;line-height:1.7}
    .footer-bottom{
      display:flex;justify-content:space-between;align-items:center;
      padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--text-muted);
    }
    .footer-links{display:flex;gap:16px}
    .footer-links a{font-size:12px;color:var(--text-muted)}

    /* ========== Floating Add Button ========== */
    .fab{
      position:fixed;bottom:32px;right:32px;width:56px;height:56px;
      background:var(--accent);color:#fff;border:none;border-radius:50%;
      font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(9,105,218,.35);
      transition:all .2s;z-index:50;display:flex;align-items:center;justify-content:center;
    }
    .fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(9,105,218,.45)}

    /* ========== Modal ========== */
    .modal-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    .modal-overlay.active{opacity:1;pointer-events:auto}
    .modal{
      background:var(--bg);border-radius:var(--radius-lg);padding:32px;
      width:90%;max-width:520px;max-height:90vh;overflow-y:auto;
      box-shadow:0 20px 60px rgba(0,0,0,.2);transform:translateY(20px);
      transition:transform .25s;
    }
    .modal-overlay.active .modal{transform:translateY(0)}
    .modal h2{font-size:22px;font-weight:700;margin-bottom:24px}
    .form-group{margin-bottom:18px}
    .form-group label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text)}
    .form-group input,.form-group select,.form-group textarea{
      width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:6px;
      font-size:14px;font-family:inherit;transition:border-color .15s;
    }
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{
      outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(9,105,218,.15);
    }
    .form-group textarea{min-height:100px;resize:vertical}
    .form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:8px}
    .btn{
      padding:10px 24px;border-radius:6px;font-size:14px;font-weight:600;
      cursor:pointer;border:none;transition:all .15s;
    }
    .btn-primary{background:var(--accent);color:#fff}
    .btn-primary:hover{background:var(--accent-hover)}
    .btn-cancel{background:var(--bg-alt);color:var(--text);border:1px solid var(--border)}
    .btn-cancel:hover{background:var(--border)}
    .btn-local{
      background:var(--bg);color:var(--accent);border:1px dashed var(--accent);
      padding:8px 16px;font-size:13px;
    }
    .btn-local:hover{background:#ddf4ff;border-style:solid}

    /* ========== Delete Button on Cards ========== */
    .card-wrapper{position:relative}
    .card-delete{
      position:absolute;top:8px;right:8px;width:28px;height:28px;
      background:rgba(255,255,255,.9);border:1px solid var(--border);border-radius:50%;
      font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;
      z-index:5;color:#cf222e;transition:all .15s;
    }
    .card-wrapper:hover .card-delete{display:flex}
    .manage-mode .card-delete{display:flex !important}
    .card-delete:hover{background:#cf222e;color:#fff;border-color:#cf222e}
    .empty-state{grid-column:1/-1;text-align:center;padding:40px;color:var(--text-muted)}

    /* ========== Trash Badge ========== */
    .trash-badge{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:18px;height:18px;padding:0 5px;border-radius:9px;
      background:#cf222e;color:#fff;font-size:11px;font-weight:700;
      margin-left:4px;vertical-align:middle;
    }

    /* ========== Trash Page ========== */
    .trash-page{display:none;max-width:1200px;margin:0 auto;padding:30px 24px}
    .trash-page.show{display:block}
    .trash-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .trash-toolbar h2{font-size:20px;font-weight:700}
    .btn-danger{
      padding:8px 16px;background:#cf222e;color:#fff;border:none;border-radius:6px;
      font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
    }
    .btn-danger:hover{background:#a40e26}
    .btn-restore{
      padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;
      font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;
    }
    .btn-restore:hover{background:var(--accent-hover)}
    .trash-item{
      display:flex;align-items:center;gap:16px;padding:14px 18px;
      border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;
      transition:all .2s;background:var(--bg);
    }
    .trash-item:hover{background:var(--bg-alt)}
    .trash-item-info{flex:1;min-width:0}
    .trash-item-title{font-size:15px;font-weight:600;margin-bottom:4px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .trash-item-meta{font-size:12px;color:var(--text-muted);display:flex;gap:12px}
    .trash-item-actions{display:flex;gap:8px;flex-shrink:0}
    .trash-item .card-category{font-size:10px;padding:2px 8px}

    /* ========== Article Detail Overlay ========== */
    .detail-overlay{
      position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    .detail-overlay.active{opacity:1;pointer-events:auto}
    .detail-panel{
      background:var(--bg);border-radius:var(--radius-lg);
      width:92%;max-width:960px;max-height:90vh;overflow-y:auto;
      box-shadow:0 20px 60px rgba(0,0,0,.25);transform:translateY(20px);
      transition:transform .25s;
    }
    .detail-overlay.active .detail-panel{transform:translateY(0)}
    .detail-hero-img{
      width:100%;height:280px;object-fit:cover;display:block;
      background:linear-gradient(135deg,#ddf4ff,#e6f0ff);
      border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    }
    .detail-hero-placeholder{
      width:100%;height:200px;display:flex;align-items:center;justify-content:center;
      font-size:64px;color:#fff;border-radius:var(--radius-lg) var(--radius-lg) 0 0;
    }
    .detail-content{padding:36px 48px 48px}
    .detail-category{
      display:inline-block;font-size:12px;font-weight:600;text-transform:uppercase;
      letter-spacing:.5px;color:var(--accent);background:#ddf4ff;
      padding:4px 12px;border-radius:20px;margin-bottom:12px;
    }
    .detail-title{font-size:30px;font-weight:700;line-height:1.35;margin-bottom:14px}
    .detail-meta{
      font-size:13px;color:var(--text-muted);margin-bottom:20px;
      display:flex;gap:16px;flex-wrap:wrap;align-items:center;
    }
    .detail-desc{font-size:15px;color:var(--text);line-height:1.8;margin-bottom:20px}
    .detail-actions{display:flex;gap:12px;flex-wrap:wrap}
    .detail-close{
      position:absolute;top:16px;right:16px;width:36px;height:36px;
      background:rgba(255,255,255,.9);border:1px solid var(--border);
      border-radius:50%;font-size:18px;cursor:pointer;display:flex;
      align-items:center;justify-content:center;color:var(--text-muted);
      transition:all .15s;z-index:5;
    }
    .detail-close:hover{background:var(--bg-alt);color:var(--text)}
    .detail-img-wrapper{position:relative}

    /* ========== Word-style Editor ========== */
    .editor-toolbar{
      display:flex;flex-wrap:wrap;gap:2px;padding:8px 10px;
      background:var(--bg-alt);border:1px solid var(--border);
      border-bottom:none;border-radius:var(--radius) var(--radius) 0 0;
      align-items:center;position:relative;
    }
    .editor-toolbar .toolbar-sep{
      width:1px;height:24px;background:var(--border);margin:0 4px;
    }
    .editor-toolbar button{
      background:none;border:none;padding:6px 8px;border-radius:4px;
      cursor:pointer;font-size:14px;color:var(--text);
      display:flex;align-items:center;justify-content:center;min-width:32px;
      transition:all .1s;
    }
    .editor-toolbar button:hover{background:#e0e3e6}
    .editor-toolbar button.active{background:#ddf4ff;color:var(--accent)}
    .save-status{
      margin-left:auto;font-size:12px;color:var(--text-muted);
      white-space:nowrap;padding-right:4px;
    }
    .save-status.saving{color:#bf8700}
    .save-status.saved{color:#1a7f37}
    .editor-body{
      min-height:480px;padding:28px 32px;border:1px solid var(--border);
      border-radius:0 0 var(--radius) var(--radius);
      font-size:15px;line-height:1.9;outline:none;overflow-y:auto;
      max-height:70vh;word-break:break-word;color:var(--text);
      margin-bottom:24px;
    }
    .editor-body:empty::before{
      content:'开始撰写正文…（支持图片、视频、代码块混排）';
      color:#8b949e;pointer-events:none;
    }
    .editor-body:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(9,105,218,.12)}
    .editor-body h1,.editor-body h2,.editor-body h3{
      margin-top:1.4em;margin-bottom:.6em;font-weight:700;line-height:1.4;
    }
    .editor-body h1{font-size:22px}
    .editor-body h2{font-size:19px}
    .editor-body h3{font-size:17px}
    .editor-body p{margin-bottom:1em}
    .editor-body img{
      max-width:100%;height:auto;border-radius:8px;margin:12px 0;
      box-shadow:0 2px 8px rgba(0,0,0,.08);
    }
    .editor-body video,.editor-body iframe{
      max-width:100%;border-radius:8px;margin:12px 0;
    }
    .editor-body pre{
      background:#1f2328;color:#e6edf3;padding:16px;border-radius:8px;
      overflow-x:auto;margin:12px 0;font-size:13px;line-height:1.6;
    }
    .editor-body code{
      background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:13px;
    }
    .editor-body pre code{background:none;padding:0;color:inherit}
    .editor-body blockquote{
      border-left:4px solid var(--accent);padding:8px 16px;margin:12px 0;
      background:#f6f8fa;color:var(--text-muted);border-radius:0 6px 6px 0;
    }
    .editor-body a{color:var(--accent)}
    .editor-body ul,.editor-body ol{padding-left:24px;margin-bottom:1em}

    /* ========== Insert Modal (image/video URL) ========== */
    .insert-modal{
      position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:210;
      display:flex;align-items:center;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .2s;
    }
    .insert-modal.active{opacity:1;pointer-events:auto}
    .insert-dialog{
      background:var(--bg);border-radius:var(--radius-lg);padding:28px;
      width:90%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.2);
    }
    .insert-dialog h3{font-size:17px;font-weight:700;margin-bottom:16px}
    .insert-dialog .form-group{margin-bottom:14px}
    .insert-dialog label{display:block;font-size:13px;font-weight:600;margin-bottom:5px}
    .insert-dialog input{
      width:100%;padding:9px 12px;border:1px solid var(--border);
      border-radius:6px;font-size:14px;
    }
    .insert-dialog input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(9,105,218,.12)}
    .insert-preview{margin-top:8px}
    .insert-preview img{max-width:100%;max-height:140px;border-radius:6px}
    .insert-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}

    /* ========== Toast ========== */
    .toast{
      position:fixed;bottom:100px;left:50%;transform:translateX(-50%);
      background:#1f2328;color:#fff;padding:12px 24px;border-radius:8px;
      font-size:14px;z-index:300;opacity:0;pointer-events:none;transition:opacity .3s;
    }
    .toast.show{opacity:1}

    /* ========== Responsive ========== */
    @media(max-width:768px){
      .header-inner{padding:0 16px}
      .nav{display:none;position:absolute;top:60px;left:0;right:0;
        flex-direction:column;background:var(--bg);border-bottom:1px solid var(--border);
        padding:8px 16px;gap:0;
      }
      .nav.open{display:flex}
      .nav a{padding:10px 12px}
      .nav-toggle{display:block}
      .featured-grid,.card-grid{grid-template-columns:1fr;gap:16px}
      .section{padding:24px 16px}
      .featured{padding:24px 16px 12px}
      .footer-bottom{flex-direction:column;gap:12px;text-align:center}
      .fab{bottom:24px;right:24px;width:48px;height:48px;font-size:24px}
      .detail-hero-img{height:180px}
      .detail-hero-placeholder{height:150px;font-size:48px}
      .detail-content{padding:20px}
      .detail-title{font-size:20px}
    }
  </style>
</head>
<body>

<a href="#main-content" class="skip-link">跳转到主要内容</a>

<!-- ==================== HEADER ==================== -->
<header class="header">
  <div class="header-inner">
    <a href="#" class="logo">
      <span class="emoji">&#128187;</span> 小甄的技术博客
    </a>
    <button class="nav-toggle" aria-label="菜单" onclick="toggleNav()">&#9776;</button>
    <nav class="nav" id="nav">
      <a href="#" class="active" onclick="filterCategory('all')">全部文章</a>
      <a href="#" onclick="filterCategory('代码')">代码</a>
      <a href="#" onclick="filterCategory('架构')">架构</a>
      <a href="#" onclick="filterCategory('踩坑')">踩坑</a>
      <a href="#" onclick="filterCategory('工具')">工具</a>
      <a href="#" onclick="filterCategory('关于')">关于</a>
      <button class="btn-add-header" onclick="openModal()">
        <span class="plus">+</span> 新增文章
      </button>
      <button class="btn-manage" id="btn-manage" onclick="toggleManageMode()">管理</button>
      <a href="#" onclick="showTrash();return false" style="margin-left:4px" id="nav-trash">
        &#128465; 回收站<span class="trash-badge" id="trash-count" style="display:none">0</span>
      </a>
    </nav>
  </div>
</header>

<main id="main-content">

  <!-- ==================== FEATURED ==================== -->

<button class="fab" onclick="openModal()" title="新增文章" aria-label="新增文章">+</button>

<!-- ==================== MODAL ==================== -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>&#128221; 新增文章</h2>
    <form id="add-form" onsubmit="handleAdd(event)">
      <div class="form-group">
        <label for="title">文章标题 *</label>
        <input type="text" id="title" placeholder="输入文章标题..." required>
      </div>
      <div class="form-group">
        <label for="category">分类 *</label>
        <select id="category" required>
          <option value="">选择分类...</option>
          <option value="代码">代码</option>
          <option value="架构">架构</option>
          <option value="踩坑">踩坑</option>
          <option value="工具">工具</option>
          <option value="关于">关于</option>
        </select>
      </div>
      <div class="form-group">
        <label for="desc">文章摘要</label>
        <textarea id="desc" placeholder="写一段简短的描述..." rows="3"></textarea>
      </div>
      <div class="form-group">
        <label for="image">封面图片 URL（可选）</label>
        <input type="url" id="image" placeholder="https://example.com/image.jpg">
        <div id="image-preview" style="margin-top:8px;display:none">
          <img src="" alt="预览" style="max-width:100%;max-height:120px;border-radius:6px;border:1px solid var(--border);object-fit:cover;">
        </div>
      </div>
      <div class="form-group">
        <label for="featured">设为精选</label>
        <select id="featured">
          <option value="false">否</option>
          <option value="true">是</option>
        </select>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn-cancel" onclick="closeModal()">取消</button>
        <button type="submit" class="btn btn-primary">发布文章</button>
      </div>
    </form>
  </div>
</div>

<!-- ==================== SCRIPTS ==================== -->
<script>
  /* ========== State ========== */
  const COLORS = ['#0969da','#1a7f37','#cf222e','#8250df','#bf3989','#0550ae'];
  const SAMPLE_CONTENT = {
    1: `<h2>前言</h2><p>TCP 协议栈是网络编程的核心，用 Rust 从零实现一个 TCP 协议栈不仅能深入理解协议细节，还能充分发挥 Rust 的所有权与零拷贝优势。</p><p>本文记录了我用 Rust 重写 TCP 协议栈的全过程，涵盖：</p><ul><li>三次握手与四次挥手的状态机实现</li><li>滑动窗口与拥塞控制算法</li><li>零拷贝缓冲区设计</li></ul><h2>核心数据结构</h2><pre><code>struct TcpSocket {
    state: TcpState,
    send_buf: RingBuffer&lt;u8&gt;,
    recv_buf: RingBuffer&lt;u8&gt;,
    snd_nxt: u32,  // 下一个要发送的序列号
    rcv_nxt: u32,  // 下一个要接收的序列号
}</code></pre><h2>拥塞控制</h2><p>实现了 CUBIC 算法，在高速网络下表现良好。测试环境：</p><ul><li>延迟：5ms</li><li>带宽：1Gbps</li><li>丢包率：0.1%</li></ul><p>优化后吞吐量提升了 <strong>3.2x</strong>。</p>`,
    4: `<h2>常见坑点</h2><p>STM32 HAL 库虽然封装了很多底层细节，但在实际项目中踩了不少坑。</p><h3>1. SPI DMA 丢数据</h3><p>问题：启用 SPI DMA 后，偶尔出现数据丢失。原因：DMA 传输完成中断与 SPI 传输完成标志不同步。</p><pre><code>// 错误写法
HAL_SPI_Transmit_DMA(&amp;hspi1, buf, len);
// 立即操作 buf ← 这里 buf 可能还在传输中！

// 正确写法：在传输完成回调中操作
void HAL_SPI_TxCpltCallback(SPI_HandleTypeDef *hspi) {
    // 这里才能安全操作 buf
}</code></pre><h3>2. I2C 总线卡死</h3><p>HAL I2C 在从设备无响应时容易卡死，需要手动复位总线。</p><blockquote>建议在 I2C 初始化时顺便配置超时检测，避免系统级卡死。</blockquote>`,
  };
  const DEFAULT_ARTICLES = [
    { id:1, title:'用 Rust 重写一个 TCP 协议栈', category:'代码', desc:'从零实现 TCP 协议栈，探讨拥塞控制、滑动窗口等核心机制，记录踩过的坑与性能优化经验。', featured:true, color:COLORS[0], image:'', content: SAMPLE_CONTENT[1] || '' },
    { id:2, title:'从单体到微服务：我的架构演进之路', category:'架构', desc:'分享一个中型项目从单体架构逐步演进到微服务架构的完整过程，含选型对比与实际问题。', featured:true, color:COLORS[1], image:'', content:'' },
    { id:3, title:'嵌入式 Linux 启动优化实战', category:'代码', desc:'将设备启动时间从 8 秒优化到 2.5 秒，详细记录内核裁剪、initramfs 与 systemd 的调优过程。', featured:true, color:COLORS[2], image:'', content:'' },
    { id:4, title:'STM32 HAL 库的那些坑', category:'踩坑', desc:'SPI DMA 传输丢数据？I2C 总线卡死？整理 HAL 库开发中最常见的 10 个坑及解决方案。', featured:false, color:COLORS[3], image:'', content: SAMPLE_CONTENT[4] || '' },
    { id:5, title:'设计一个高性能消息队列', category:'架构', desc:'从需求分析到技术选型，设计一个支持百万 TPS 的消息队列，并深入讨论存储与复制机制。', featured:false, color:COLORS[4], image:'', content:'' },
    { id:6, title:'CMake 现代工程实践指南', category:'工具', desc:'告别混乱的 CMakeLists.txt，用 Modern CMake 最佳实践管理复杂的 C/C++ 嵌入式项目。', featured:false, color:COLORS[5], image:'', content:'' },
    { id:7, title:'PostgreSQL 查询优化 20 条经验', category:'踩坑', desc:'整理实际项目中遇到的慢查询问题，覆盖索引设计、执行计划分析、锁排查等核心场景。', featured:false, color:COLORS[0], image:'', content:'' },
    { id:8, title:'Docker 多阶段构建最佳实践', category:'工具', desc:'如何用多阶段构建将 Docker 镜像从 1.2GB 瘦身到 80MB，附完整 Dockerfile 示例。', featured:false, color:COLORS[1], image:'', content:'' },
    { id:9, title:'自建 Git 服务器选型对比', category:'工具', desc:'Gitea vs GitLab vs Gogs 全面对比，从安装部署、资源占用到功能覆盖度的详细评测。', featured:false, color:COLORS[2], image:'', content:'' },
    { id:10, title:'FreeRTOS 任务调度源码分析', category:'代码', desc:'深入 FreeRTOS 内核，逐行分析任务调度器的实现原理，理解抢占与时间片轮转的细节。', featured:false, color:COLORS[3], image:'', content:'' },
    { id:11, title:'年终总结：2025 技术成长回顾', category:'关于', desc:'回顾过去一年的技术成长：掌握的新技能、参与的项目、阅读的书单，以及对 2026 的展望。', featured:false, color:COLORS[4], image:'', content:'' },
    { id:12, title:'关于我', category:'关于', desc:'一枚嵌入式工程师，热爱开源，喜欢钻研底层原理。这里是我的技术自留地。', featured:false, color:COLORS[5], image:'', content:'' },
  ];

  let articles = loadArticles();
  let trash = loadTrash();
  let manageMode = false;
  let lastDeleted = null;
  let undoTimer = null;

  function loadArticles() {
    const saved = localStorage.getItem('blog_articles');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        // Migration: add content field if missing
        data.forEach(a => { if (a.content === undefined) a.content = ''; });
        return data;
      } catch(e) {}
    }
    return [...DEFAULT_ARTICLES];
  }

  function saveArticles() {
    localStorage.setItem('blog_articles', JSON.stringify(articles));
  }

  function loadTrash() {
    const saved = localStorage.getItem('blog_trash');
    return saved ? JSON.parse(saved) : [];
  }

  function saveTrash() {
    localStorage.setItem('blog_trash', JSON.stringify(trash));
    updateTrashBadge();
  }

  function updateTrashBadge() {
    const badge = document.getElementById('trash-count');
    if (trash.length > 0) {
      badge.style.display = 'inline-flex';
      badge.textContent = trash.length;
    } else {
      badge.style.display = 'none';
    }
    const btn = document.getElementById('btn-empty-trash');
    if (btn) btn.style.display = trash.length > 0 ? '' : 'none';
  }

  /* ========== Render ========== */
  function renderCard(a) {
    const imgHtml = a.image
      ? `<img src="${escapeHtml(a.image)}" class="card-img" alt="${escapeHtml(a.title)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-img-error" style="display:none">&#128247; 图片加载失败</div>`
      : `<div class="card-img-placeholder" style="background:linear-gradient(135deg,${a.color},${a.color}cc)">&#128196;</div>`;

    return `
      <div class="card-wrapper">
        <button class="card-delete" title="删除" onclick="event.stopPropagation();deleteArticle(${a.id})">&times;</button>
        <button class="card-upload-btn" title="更换封面图片" onclick="event.stopPropagation();uploadCover(${a.id})">&#128247;</button>
        <input type="file" class="card-upload-input" id="cover-upload-${a.id}" accept="image/*" onchange="handleCoverUpload(${a.id}, this)">
        <div class="card" onclick="viewArticle(${a.id})">
          ${imgHtml}
          <div class="card-body">
            <span class="card-category">${a.category}</span>
            <h3 class="card-title">${escapeHtml(a.title)}</h3>
            ${a.desc ? `<p class="card-desc">${escapeHtml(a.desc)}</p>` : ''}
            <span class="card-readmore">阅读全文 &rarr;</span>
          </div>
        </div>
      </div>`;
  }

  function renderAll() {
    // Featured
    const featured = articles.filter(a => a.featured);
    const featuredGrid = document.getElementById('featured-grid');
    featuredGrid.innerHTML = featured.length
      ? featured.map(renderCard).join('')
      : '<div class="empty-state">暂无精选文章，在新增文章时可勾选"设为精选"</div>';

    // Category grids
    const categories = { '代码':'code', '架构':'architecture', '踩坑':'debug', '工具':'tools' };
    for (const [cat, key] of Object.entries(categories)) {
      const items = articles.filter(a => a.category === cat && !a.featured).slice(0, 3);
      const grid = document.getElementById('grid-' + key);
      grid.innerHTML = items.length
        ? items.map(renderCard).join('')
        : '<div class="empty-state">该分类暂无文章，点击下方 + 新增一篇吧</div>';
    }

    // Check if featured section should show
    document.getElementById('featured-section').style.display = featured.length ? '' : 'none';
  }

  /* ========== Utilities ========== */
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  /* ========== Image Preview ========== */
  document.addEventListener('DOMContentLoaded', () => {
    const imgInput = document.getElementById('image');
    imgInput.addEventListener('input', function() {
      const preview = document.getElementById('image-preview');
      const img = preview.querySelector('img');
      if (this.value.trim()) {
        img.src = this.value.trim();
        preview.style.display = 'block';
      } else {
        preview.style.display = 'none';
      }
    });
  });

  /* ========== Manage Mode ========== */
  function toggleManageMode() {
    manageMode = !manageMode;
    const btn = document.getElementById('btn-manage');
    if (manageMode) {
      document.body.classList.add('manage-mode');
      btn.classList.add('active');
      btn.textContent = '退出管理';
    } else {
      document.body.classList.remove('manage-mode');
      btn.classList.remove('active');
      btn.textContent = '管理';
    }
  }
  function filterCategory(cat) {
    // Update nav active
    document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
    const links = document.querySelectorAll('.nav a');
    links.forEach(a => {
      if (a.textContent.includes(cat === 'all' ? '全部' : cat)) a.classList.add('active');
    });

    // Ensure trash page is hidden and normal sections are visible
    document.getElementById('trash-page').classList.remove('show');
    document.querySelector('.social').style.display = '';
    document.getElementById('featured-section').style.display = '';
    document.querySelectorAll('.section').forEach(s => s.style.display = '');
    renderAll();
    closeMobileNav();

    // Scroll to category section
    const sectionMap = {
      '代码': 'category-code',
      '架构': 'category-architecture',
      '踩坑': 'category-debug',
      '工具': 'category-tools',
      '关于': null,
      'all': null
    };

    const targetId = sectionMap[cat];
    if (targetId) {
      const el = document.getElementById(targetId);
      if (el) {
        const headerHeight = 72; // sticky header offset
        const top = el.getBoundingClientRect().top + window.pageYOffset - headerHeight;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    } else {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Show toast with count
    if (cat !== 'all' && cat !== '关于') {
      const filtered = articles.filter(a => a.category === cat);
      showToast(`${cat}分类共 ${filtered.length} 篇文章`);
    }
  }

  /* ========== Modal ========== */
  function openModal() {
    document.getElementById('modal-overlay').classList.add('active');
    document.getElementById('title').focus();
  }

  function closeModal() {
    document.getElementById('modal-overlay').classList.remove('active');
    document.getElementById('add-form').reset();
  }

  function closeModalOutside(e) {
    if (e.target === document.getElementById('modal-overlay')) closeModal();
  }

  /* ========== Handle Add ========== */
  function handleAdd(e) {
    e.preventDefault();
    const title = document.getElementById('title').value.trim();
    const category = document.getElementById('category').value;
    const desc = document.getElementById('desc').value.trim();
    const image = document.getElementById('image').value.trim();
    const featured = document.getElementById('featured').value === 'true';

    const newArticle = {
      id: Date.now(),
      title,
      category,
      desc,
      image,
      featured,
      content: '',
      color: COLORS[Math.floor(Math.random() * COLORS.length)]
    };

    // If featured, un-feature others if > 3
    if (featured) {
      const featuredCount = articles.filter(a => a.featured).length;
      if (featuredCount >= 6) {
        articles.find(a => a.featured).featured = false;
      }
    }

    articles.unshift(newArticle);
    saveArticles();
    renderAll();
    closeModal();
    showToast('文章发布成功！');
    closeMobileNav();
  }

  /* ========== Delete ========== */
  function deleteArticle(id) {
    const idx = articles.findIndex(a => a.id === id);
    if (idx === -1) return;
    lastDeleted = articles.splice(idx, 1)[0];
    trash.unshift({ ...lastDeleted, deletedAt: Date.now() });
    saveArticles();
    saveTrash();
    renderAll();
    showToast('文章已移至回收站', 'undo-delete');
    clearTimeout(undoTimer);
    undoTimer = setTimeout(() => { lastDeleted = null; }, 5000);
  }

  function undoDelete() {
    if (!lastDeleted) return;
    articles.unshift(lastDeleted);
    const trashIdx = trash.findIndex(t => t.id === lastDeleted.id);
    if (trashIdx !== -1) trash.splice(trashIdx, 1);
    lastDeleted = null;
    saveArticles();
    saveTrash();
    renderAll();
    if (document.getElementById('trash-page').classList.contains('show')) renderTrash();
    showToast('已撤销删除');
  }

  /* ========== View ========== */
  let currentDetailId = null;
  let insertMode = null; // 'image' or 'video'

  function viewArticle(id) {
    const a = articles.find(x => x.id === id);
    if (!a) return;
    currentDetailId = id;

    // Populate detail panel
    const img = document.getElementById('detail-img');
    const placeholder = document.getElementById('detail-placeholder');
    if (a.image) {
      img.src = a.image;
      img.style.display = 'block';
      placeholder.style.display = 'none';
    } else {
      img.style.display = 'none';
      placeholder.style.display = 'flex';
      placeholder.style.background = `linear-gradient(135deg,${a.color},${a.color}cc)`;
    }

    document.getElementById('detail-category').textContent = a.category;
    document.getElementById('detail-title').textContent = a.title;

    // Set body content (Word-style: always editable)
    const body = document.getElementById('editor-body');
    body.innerHTML = a.content || '';

    // Meta info
    const dateStr = new Date(a.id).toLocaleDateString('zh-CN', {
      year: 'numeric', month: 'long', day: 'numeric'
    });
    document.getElementById('detail-meta').innerHTML = `
      <span>&#128197; ${dateStr}</span>
      <span>&#128451; ${a.category}</span>
      ${a.featured ? '<span style="color:#cf222e">&#11088; 精选</span>' : ''}
    `;

    // Show overlay
    document.getElementById('detail-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';

    // Focus editor body after render
    setTimeout(() => {
      const b = document.getElementById('editor-body');
      b.focus();
      const sel = window.getSelection();
      if (b.childNodes.length) {
        const r = document.createRange();
        r.setStartAfter(b.lastChild);
        r.collapse(true);
        sel.removeAllRanges();
        sel.addRange(r);
      }
    }, 150);
  }

  function closeDetail() {
    saveNow();
    document.getElementById('detail-overlay').classList.remove('active');
    document.body.style.overflow = '';
    currentDetailId = null;
  }

  function closeDetailOutside(e) {
    if (e.target === document.getElementById('detail-overlay')) closeDetail();
  }

  function deleteFromDetail() {
    if (!currentDetailId) return;
    if (!confirm('确定要删除这篇文章吗？')) return;
    deleteArticle(currentDetailId);
    closeDetail();
  }

  /* ========== Auto-Save (Word-style: save on every change) ========== */
  let autoSaveTimer = null;
  function autoSave() {
    const statusEl = document.getElementById('save-status');
    statusEl.textContent = '保存中…';
    statusEl.className = 'save-status saving';
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      saveNow();
    }, 1200);
  }

  function saveNow() {
    clearTimeout(autoSaveTimer);
    const a = articles.find(x => x.id === currentDetailId);
    if (!a) return;
    const html = document.getElementById('editor-body').innerHTML;
    if (html === a.content) return; // No change
    a.content = html;
    saveArticles();
    const statusEl = document.getElementById('save-status');
    statusEl.textContent = '已保存';
    statusEl.className = 'save-status saved';
    setTimeout(() => { statusEl.className = 'save-status'; statusEl.textContent = '已保存'; }, 2000);
  }

  /* ========== Editor Toolbar ========== */
  function execCmd(cmd, val) {
    document.getElementById('editor-body').focus();
    if (val !== undefined) {
      document.execCommand(cmd, false, val);
    } else {
      document.execCommand(cmd, false, null);
    }
    updateToolbarState();
    autoSave();
  }

  /* ========== Toolbar State Tracking ========== */
  function updateToolbarState() {
    const editor = document.getElementById('editor-body');
    if (document.activeElement !== editor) return;
    const cmds = ['bold', 'italic', 'underline'];
    const toolbar = document.querySelector('.editor-toolbar');
    if (!toolbar) return;
    cmds.forEach(cmd => {
      const buttons = toolbar.querySelectorAll('button');
      buttons.forEach(btn => {
        if (btn.getAttribute('onclick') && btn.getAttribute('onclick').includes("execCmd('" + cmd + "'")) {
          btn.classList.toggle('active', document.queryCommandState(cmd));
        }
      });
    });
  }

  /* ========== Paste Image Support + Auto-Save Wireup ========== */
  document.addEventListener('DOMContentLoaded', function() {
    const editor = document.getElementById('editor-body');
    // Paste images
    editor.addEventListener('paste', function(e) {
      const items = e.clipboardData && e.clipboardData.items;
      if (!items) return;
      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        if (item.type.indexOf('image') === 0) {
          e.preventDefault();
          const blob = item.getAsFile();
          const reader = new FileReader();
          reader.onload = function(event) {
            const imgHtml = `<p><img src="${event.target.result}" alt="粘贴的图片" style="max-width:100%"></p>`;
            insertHTML(imgHtml);
            autoSave();
            showToast('图片已粘贴');
          };
          reader.readAsDataURL(blob);
          return;
        }
      }
    });

    // Auto-save on input
    editor.addEventListener('input', function() {
      autoSave();
    });

    // Track selection changes for toolbar state
    document.addEventListener('selectionchange', function() {
      updateToolbarState();
    });
    editor.addEventListener('keyup', function() { updateToolbarState(); });
    editor.addEventListener('mouseup', function() { updateToolbarState(); });
  });

  /* ========== Insert Helper ========== */
  function insertHTML(html) {
    const editor = document.getElementById('editor-body');
    editor.focus();
    const sel = window.getSelection();
    if (sel.rangeCount > 0 && editor.contains(sel.anchorNode)) {
      const range = sel.getRangeAt(0);
      range.deleteContents();
      const fragment = range.createContextualFragment(html);
      range.insertNode(fragment);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      editor.innerHTML += html;
    }
  }

  /* ========== Insert Link ========== */
  function insertLink() {
    router('link');
  }

  /* ========== Insert Code Block ========== */
  function insertCodeBlock() {
    router('code');
  }

  /* ========== Insert Image ========== */
  /* General-purpose insert modal opener */
  function router(mode) {
    insertMode = mode;
    const title = document.getElementById('insert-modal-title');
    const label = document.getElementById('insert-modal-label');
    const urlInput = document.getElementById('insert-url');
    const captionGroup = document.getElementById('insert-caption-group');
    const captionInput = document.getElementById('insert-caption');
    const captionLabel = document.querySelector('#insert-caption-group label');
    const fileGroup = document.getElementById('insert-file-group');
    const fileInput = document.getElementById('insert-file');
    const preview = document.getElementById('insert-preview');

    urlInput.value = '';
    captionInput.value = '';
    preview.innerHTML = '';
    captionGroup.style.display = 'none';
    fileGroup.style.display = 'none';
    fileInput.value = '';
    urlInput.style.display = 'block';
    document.getElementById('insert-modal-label').style.display = 'block';
    window._localFileData = null;

    if (mode === 'image') {
      title.textContent = '插入图片';
      label.textContent = '图片 URL（或点击下方按钮选择本地文件）';
      urlInput.placeholder = 'https://example.com/image.jpg';
      urlInput.type = 'url';
      captionInput.placeholder = '图片描述（alt，可选）';
      captionGroup.style.display = 'block';
      if (captionLabel) captionLabel.textContent = '图片描述';
      fileGroup.style.display = 'block';
      urlInput.oninput = function() {
        const url = this.value.trim();
        if (url && (url.match(/\.(jpg|jpeg|png|gif|webp|svg|bmp)(\?.*)?$/i) || url.match(/\/img\//) || url.match(/\/image\//))) {
          preview.innerHTML = `<img src="${escapeHtml(url)}" alt="预览" style="max-width:100%;max-height:140px;border-radius:6px" onerror="this.style.display='none'">`;
        } else {
          preview.innerHTML = '';
        }
      };
    } else if (mode === 'video') {
      title.textContent = '插入视频';
      label.textContent = '视频 URL（支持 B站 / YouTube / 直接视频文件）';
      urlInput.placeholder = 'https://www.bilibili.com/video/BV... 或 https://youtu.be/...';
      urlInput.type = 'url';
      urlInput.oninput = function() {
        preview.innerHTML = '<span style="font-size:13px;color:var(--text-muted)">输入 URL 后点击「插入」即可</span>';
      };
    } else if (mode === 'link') {
      title.textContent = '插入链接';
      label.textContent = '链接 URL';
      urlInput.placeholder = 'https://example.com';
      urlInput.type = 'url';
      captionInput.placeholder = '链接显示文字';
      captionGroup.style.display = 'block';
      if (captionLabel) captionLabel.textContent = '显示文字';
      urlInput.oninput = function() { preview.innerHTML = ''; };
    } else if (mode === 'code') {
      title.textContent = '插入代码块';
      label.textContent = '编程语言（可选）';
      urlInput.placeholder = '如 javascript, python, rust, c, bash…';
      urlInput.type = 'text';
      urlInput.oninput = function() { preview.innerHTML = ''; };
    }

    document.getElementById('insert-modal').classList.add('active');
    setTimeout(() => urlInput.focus(), 100);
  }

  function insertImage() { router('image'); }
  function insertVideo() { router('video'); }

  /* ========== Local File Handler ========== */
  function handleLocalFile(input) {
    const file = input.files && input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      showToast('图片不能超过 5MB');
      input.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      const dataUrl = e.target.result;
      window._localFileData = dataUrl;
      document.getElementById('insert-url').value = '[本地文件] ' + file.name;
      const preview = document.getElementById('insert-preview');
      preview.innerHTML = `<img src="${dataUrl}" alt="${file.name}" style="max-width:100%;max-height:140px;border-radius:6px">`;
    };
    reader.readAsDataURL(file);
  }

  /* ========== Cover Upload ========== */
  function uploadCover(articleId) {
    const input = document.getElementById('cover-upload-' + articleId);
    if (input) input.click();
  }

  function handleCoverUpload(articleId, input) {
    const file = input.files && input.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) {
      showToast('图片不能超过 5MB');
      input.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = function(e) {
      const a = articles.find(x => x.id === articleId);
      if (!a) return;
      a.image = e.target.result;
      saveArticles();
      renderAll();
      showToast('封面已更新');
    };
    reader.readAsDataURL(file);
  }

  /* ========== Confirm Insert ========== */
  function confirmInsert() {
    const url = document.getElementById('insert-url').value.trim();
    const caption = document.getElementById('insert-caption').value.trim();
    if (!url && insertMode !== 'code') {
      showToast('请输入 URL');
      return;
    }

    let html = '';
    if (insertMode === 'image') {
      const src = window._localFileData || url;
      if (!src) { showToast('请选择图片或输入 URL'); return; }
      const alt = caption || '图片';
      html = `<p><img src="${escapeHtml(src)}" alt="${escapeHtml(alt)}"></p>`;
      window._localFileData = null;
    } else if (insertMode === 'video') {
      html = generateVideoEmbed(url);
    } else if (insertMode === 'link') {
      if (!url) { showToast('请输入链接 URL'); return; }
      const text = caption || url;
      const sel = window.getSelection();
      if (sel.rangeCount > 0 && !sel.isCollapsed) {
        // Use selected text as link text
        document.execCommand('createLink', false, url);
        closeInsertModal();
        showToast('链接已插入');
        return;
      }
      html = `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(text)}</a>`;
    } else if (insertMode === 'code') {
      const lang = url || '';
      const langClass = lang ? ` class="language-${escapeHtml(lang.toLowerCase())}"` : '';
      html = `<pre><code${langClass}>在此输入代码...</code></pre>`;
    }

    insertHTML(html);
    autoSave();
    closeInsertModal();
    if (insertMode === 'image') showToast('图片已插入');
    else if (insertMode === 'video') showToast('视频已插入');
    else if (insertMode === 'code') showToast('代码块已插入，请直接在编辑器中编辑代码');
  }

  function generateVideoEmbed(url) {
    // Bilibili
    const biliMatch = url.match(/bilibili\.com\/video\/(BV\w+)/i);
    if (biliMatch) {
      const bvid = biliMatch[1];
      return `<p><iframe src="//player.bilibili.com/player.html?bvid=${bvid}&autoplay=0" width="720" height="450" allowfullscreen frameborder="0" style="max-width:100%;border-radius:8px"></iframe></p>`;
    }

    // YouTube
    const ytMatch1 = url.match(/youtube\.com\/watch\?v=([\w-]+)/i);
    const ytMatch2 = url.match(/youtu\.be\/([\w-]+)/i);
    const ytId = ytMatch1 ? ytMatch1[1] : (ytMatch2 ? ytMatch2[1] : null);
    if (ytId) {
      return `<p><iframe src="https://www.youtube.com/embed/${ytId}?rel=0" width="720" height="450" allowfullscreen frameborder="0" style="max-width:100%;border-radius:8px"></iframe></p>`;
    }

    // Direct video file
    if (url.match(/\.(mp4|webm|ogg|mov)(\?.*)?$/i)) {
      return `<p><video src="${escapeHtml(url)}" controls style="max-width:100%;border-radius:8px"></video></p>`;
    }

    // Generic iframe fallback
    return `<p><a href="${escapeHtml(url)}" target="_blank" style="color:var(--accent)">${escapeHtml(url)}</a></p>`;
  }

  function closeInsertModal() {
    document.getElementById('insert-modal').classList.remove('active');
    insertMode = null;
  }

  function closeInsertModalOutside(e) {
    if (e.target === document.getElementById('insert-modal')) closeInsertModal();
  }

  /* ========== Trash Page ========== */
  function showTrash() {
    // Hide main content sections
    document.getElementById('featured-section').style.display = 'none';
    document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
    document.querySelector('.social').style.display = 'none';
    // Show trash page
    document.getElementById('trash-page').classList.add('show');
    // Update nav
    document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
    document.getElementById('nav-trash').classList.add('active');
    renderTrash();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function hideTrash() {
    document.getElementById('trash-page').classList.remove('show');
    document.querySelector('.social').style.display = '';
    document.getElementById('featured-section').style.display = '';
    document.querySelectorAll('.section').forEach(s => s.style.display = '');
    document.querySelectorAll('.nav a').forEach(a => a.classList.remove('active'));
    document.querySelector('.nav a').classList.add('active');
    renderAll();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    closeMobileNav();
  }

  function renderTrash() {
    const list = document.getElementById('trash-list');
    updateTrashBadge();
    if (trash.length === 0) {
      list.innerHTML = '<div class="empty-state">回收站是空的</div>';
      return;
    }
    const timeAgo = ts => {
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return '刚刚';
      if (mins < 60) return `${mins} 分钟前`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours} 小时前`;
      const days = Math.floor(hours / 24);
      return `${days} 天前`;
    };
    list.innerHTML = trash.map(t => `
      <div class="trash-item">
        <div class="trash-item-info">
          <div class="trash-item-title">${escapeHtml(t.title)}</div>
          <div class="trash-item-meta">
            <span class="card-category">${t.category}</span>
            <span>删除于 ${timeAgo(t.deletedAt)}</span>
          </div>
        </div>
        <div class="trash-item-actions">
          <button class="btn-restore" onclick="restoreArticle(${t.id})">&#8634; 恢复</button>
          <button class="btn-danger" onclick="permanentDelete(${t.id})">彻底删除</button>
        </div>
      </div>
    `).join('');
  }

  function restoreArticle(id) {
    const idx = trash.findIndex(t => t.id === id);
    if (idx === -1) return;
    const article = trash.splice(idx, 1)[0];
    delete article.deletedAt;
    articles.unshift(article);
    saveArticles();
    saveTrash();
    renderTrash();
    showToast('「' + article.title + '」已恢复');
    // If trash is now empty, go back to home
    if (trash.length === 0) { setTimeout(hideTrash, 600); }
  }

  function permanentDelete(id) {
    if (!confirm('彻底删除后无法恢复，确定吗？')) return;
    const idx = trash.findIndex(t => t.id === id);
    if (idx === -1) return;
    const title = trash[idx].title;
    trash.splice(idx, 1);
    saveTrash();
    renderTrash();
    showToast('「' + title + '」已彻底删除');
    if (trash.length === 0) { setTimeout(hideTrash, 600); }
  }

  function emptyTrash() {
    if (trash.length === 0) return;
    if (!confirm(`回收站中有 ${trash.length} 篇文章，清空后无法恢复，确定吗？`)) return;
    trash = [];
    saveTrash();
    renderTrash();
    showToast('回收站已清空');
    setTimeout(hideTrash, 600);
  }

  /* ========== Toast ========== */
  function showToast(msg, type) {
    const toast = document.getElementById('toast');
    if (type === 'undo-delete') {
      toast.innerHTML = `${msg} &nbsp; <a href="#" onclick="undoDelete();return false" style="color:#58a6ff;font-weight:600">撤销</a>`;
    } else {
      toast.textContent = msg;
    }
    toast.classList.add('show');
    clearTimeout(toast._timer);
    toast._timer = setTimeout(() => toast.classList.remove('show'), type === 'undo-delete' ? 5000 : 2500);
  }

  /* ========== Mobile Nav ========== */
  function toggleNav() {
    document.getElementById('nav').classList.toggle('open');
  }
  function closeMobileNav() {
    document.getElementById('nav').classList.remove('open');
  }

  /* ========== Keyboard ========== */
  document.addEventListener('keydown', e => {
    // Insert modal open → Escape closes it first
    if (e.key === 'Escape' && document.getElementById('insert-modal').classList.contains('active')) {
      closeInsertModal();
      e.preventDefault();
      return;
    }
    // Detail overlay open → Escape closes it
    if (e.key === 'Escape') {
      if (document.getElementById('detail-overlay').classList.contains('active')) {
        closeDetail();
        e.preventDefault();
        return;
      }
    }
    // Ctrl+S → save
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      if (document.getElementById('detail-overlay').classList.contains('active')) {
        e.preventDefault();
        saveNow();
        showToast('已保存');
      }
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
      e.preventDefault();
      openModal();
    }
  });

  /* ========== Init ========== */
  renderAll();
  updateTrashBadge();
</script>

</body>
</html>
